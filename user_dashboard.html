<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard | Versiety</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body style="padding-top: 80px;">
    <nav>
        <div class="logo">VERSIETY</div>
        <div class="nav-links">
            <span id="user-display" style="color: var(--text-dim); font-size: 0.9rem;"></span>
            <button id="logout-btn" class="btn btn-login">Logout</button>
        </div>
    </nav>

    <div class="dashboard-container">
        <h1 style="margin-bottom: 3rem; font-size: 3rem;">Welcome to Versiety</h1>
        
        <div class="panels-container">
            <div class="panel-item">
                <div class="big-panel">
                    <i class="fas fa-crown" style="color: var(--primary);"></i>
                    <h3>Subscription</h3>
                    <div class="panel-content">
                        <p id="sub-status" style="font-weight: 600;">Checking status...</p>
                        <button id="renew-sub-btn" class="auth-btn big-btn">RENEW SUBSCRIPTION</button>
                        
                        <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--glass-border); width: 100%;">
                            <p style="font-size: 0.9rem; margin-bottom: 1rem; color: var(--text-dim); text-align: left;">Redeem License Key</p>
                            <div style="display: flex; gap: 0.5rem; width: 100%;">
                                <input type="text" id="redeem-key-input" placeholder="XXXX-XXXX-XXXX" style="background: var(--bg-dark); border: 1px solid var(--glass-border); border-radius: 8px; color: white; padding: 0.7rem; flex: 1; outline: none; font-family: monospace;">
                                <button id="redeem-key-btn" class="btn btn-login" style="white-space: nowrap;">REDEEM</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="panel-item">
                <div class="big-panel">
                    <i class="fas fa-bolt" style="color: var(--accent);"></i>
                    <h3>Quick Actions</h3>
                    <div class="panel-content">
                        <p>Access your client and start playing.</p>
                        <button id="download-btn" class="btn btn-signup big-btn">DOWNLOAD CLIENT</button>
                    </div>
                </div>
            </div>
            
            <div class="panel-item">
                <div class="big-panel">
                    <i class="fas fa-newspaper" style="color: var(--secondary);"></i>
                    <h3>Latest News</h3>
                    <div class="panel-content">
                        <p style="color: var(--accent);">[FIX] Menu/Game end crash resolved.</p>
                        <p style="color: var(--text-dim); font-size: 0.8rem; margin-top: 1rem;">March 12, 2026</p>
                        <a href="news.html" class="btn btn-signup big-btn" style="width: 100%; text-decoration: none; display: block; text-align: center;">VIEW ALL NEWS</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Renewal Modal -->
    <div id="renewal-modal" class="modal">
        <div class="modal-content">
            <i class="fas fa-times close-modal" id="close-renewal"></i>
            <h2 style="margin-bottom: 2rem; text-align: center;">Choose Your Plan</h2>
            
            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <button class="plan-btn" data-days="1">
                    <span>1 Day Access</span>
                    <span class="price">1 €</span>
                </button>
                <button class="plan-btn" data-days="7">
                    <span>7 Days Access</span>
                    <span class="price">3 €</span>
                </button>
                <button class="plan-btn" data-days="30">
                    <span>30 Days Access</span>
                    <span class="price">8 €</span>
                </button>
            </div>

            <div style="margin-top: 2rem; text-align: center; color: var(--text-dim); font-size: 0.85rem;">
                All payments are processed securely.
            </div>
        </div>
    </div>

    <!-- Download Loader (Hidden by default, used by script.js) -->
    <div id="loader-container" class="loader-container" style="position: fixed; bottom: 2rem; right: 2rem; background: var(--bg-card); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--glass-border); width: 300px; z-index: 1000; display: none;">
        <div class="loader-status" style="font-size: 0.85rem;">Downloading... <span id="progress-percent">0%</span></div>
        <div class="loader-bar" style="height: 6px; margin: 0.5rem 0;">
            <div id="loader-progress" class="loader-progress"></div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
